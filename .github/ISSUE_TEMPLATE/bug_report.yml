name: 🐛 Bug Report
description: Report a bug in the Fleeks TypeScript SDK
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: input
    id: sdk-version
    attributes:
      label: SDK Version
      description: "Check `package.json` or `npm list @fleeks-ai/sdk`"
      placeholder: "e.g. 0.3.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: "Output of `node --version`"
      placeholder: "e.g. 20.10.0"
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - "Node.js"
        - "Deno"
        - "Bun"
        - "Browser"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - "Client / Authentication"
        - "Environments (create, start, stop)"
        - "Files / File System"
        - "Code Execution"
        - "AI Agent Integration"
        - "WebSocket / Real-time"
        - "TypeScript Types"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Code to Reproduce
      description: Minimal code snippet that reproduces the issue.
      render: typescript
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include full error output if applicable.
    validations:
      required: true
